<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i10 Downloader</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #ff0000; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin-bottom: 1rem; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        select { width: 100%; padding: 12px; margin-bottom: 1rem; border-radius: 8px; border: 2px solid #ddd; }
        button { background: #ff0000; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #cc0000; }
        .footer { margin-top: 1.5rem; font-size: 12px; color: #777; }
    </style>
</head>
<body>
    <div class="card">
        <h1>i10 Downloader</h1>
        <form action="/download" method="POST">
            <input type="text" name="url" placeholder="Paste YouTube Link Here..." required>
            <select name="format">
                <option value="mp4">Video (MP4)</option>
                <option value="mp3">Audio (MP3)</option>
            </select>
            <button type="submit">Download Now</button>
        </form>
        <div class="footer">Made for i10 Users • Free Forever</div>
    </div>
</body>
</html>

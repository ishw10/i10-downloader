<!DOCTYPE html>
<html>
<head>

<title>I10 Downloader</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding-top:100px;
}

input{
width:60%;
padding:12px;
font-size:16px;
}

select{
padding:12px;
font-size:16px;
}

button{
padding:12px 20px;
font-size:16px;
background:red;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h1>I10 Video Downloader</h1>

<form action="/download" method="post">

<input type="text" name="url" placeholder="Paste YouTube Link Here" required>

<br><br>

<select name="format">

<option value="mp4">MP4 Video</option>
<option value="mp3">MP3 Audio</option>

</select>

<br><br>

<button type="submit">Download</button>

</form>

</body>
</html>
